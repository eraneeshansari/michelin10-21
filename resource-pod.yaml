apiVersion: v1
kind: Pod
metadata:
   name: mypod-resource
   labels:
      app: myapp
   annotations:
      description: "this is sample pod"
spec:
   containers:
   - name: appcon
     image: nginx:latest
     ports:
     - containerPort: 80
     resources:
        limits:
           memory: 512Mi
           cpu: 1
        requests:
           memory: 128Mi
           cpu: 0.5

   - name: con2
     image: tomcat:latest
     ports:
     - containerPort: 8080
     resources:
        limits:
           memory: 512Mi
           cpu: 1
        requests:
           memory: 128Mi
           cpu: 0.5
