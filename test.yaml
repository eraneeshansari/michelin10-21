apiVersion: v1
kind: Service
metadata:
  name: test-pod
spec:
  type: NodePort
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    run: test-pod
---
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    run: test-pod
  name: test-pod
spec:
  containers:
  - image: httpd:latest
    name: test-pod
    ports:
    - containerPort: 80
