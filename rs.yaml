apiVersion: apps/v1
kind: ReplicaSet
metadata:
    name: myrs
spec:
  replicas: 3
  selector:
    matchExpressions:
     - key: app
       operator: In
       values: ["myapp"]
     - key: env
       operator: NotIn
       values: ["dev"]
  template:
     metadata:
       labels:
          app: myapp
     spec:
       containers:
       - name: app
         image: nginx:latest
         ports:
         - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
   name: myrs-svc
spec:
   type: NodePort
   selector:
      app: myapp
   ports:
   - port: 80
     nodePort: 30127

