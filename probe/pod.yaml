apiVersion: v1
kind: Pod
metadata:
   name: mypod-live
   labels:
      app: myapp
   annotations:
      description: "this is sample pod"
spec:
   containers:
   - name: appcon
     image: nginx:latest
     ports:
     - containerPort: 80
   - name: con2
     image: tomcat:latest
     ports:
     - containerPort: 8080
     livenessProbe:
        exec:
           command:
           - cat 
           - /etc/hosts123
        initialDelaySeconds: 10
        periodSeconds: 5

