apiVersion: v1
kind: Pod
metadata:
   name: mypod-taint-tol
   labels:
      app: myapp
   annotations:
      description: "this is sample pod"
spec:
   containers:
   - name: appcon
     image: nginx:latest
     ports:
     - containerPort: 80
   - name: con2
     image: tomcat:latest
     ports:
     - containerPort: 8080
   tolerations:
   - key: "server"
     operator: "Equal"
     value: "dell"
     effect: "NoExecute"

---
apiVersion: v1
kind: Service
metadata:
   name: mypod-svc
spec:
   type: NodePort
   selector:
      app: myapp
   ports:
   - port: 80
     nodePort: 30123
