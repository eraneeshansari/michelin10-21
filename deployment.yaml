apiVersion: apps/v1
kind: Deployment
metadata:
    name: my-deploy
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myapp
  template:
     metadata:
       labels:
          app: myapp
     spec:
       containers:
       - name: app
         image: nginx:latest
         ports:
         - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
   name: mydep-svc
spec:
   type: NodePort
   selector:
      app: myapp
   ports:
   - port: 80
     nodePort: 30122

---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: my-deploy
spec:
  maxReplicas: 15
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-deploy
  targetCPUUtilizationPercentage: 75
