apiVersion: v1
kind: ReplicationController
metadata:
    name: myrc 
spec:
  replicas: 4
  selector:
     app: myapp
  template:
     metadata:
       labels:
          app: myapp
     spec:
       containers:
       - name: app
         image: nginx:latest
         ports:
         - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
   name: myrc-svc
spec:
   type: NodePort
   selector:
      app: myapp
   ports:
   - port: 80
     nodePort: 30125

