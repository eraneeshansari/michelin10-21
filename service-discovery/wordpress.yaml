apiVersion: v1
kind: Pod
metadata:
   name: wordpress
   labels:
      app: wordpress
   annotations:
      description: "this is sample pod"
spec:
   containers:
   - name: appcon
     image: wordpress:latest
     ports:
     - containerPort: 80
     env:
     - name: WORDPRESS_DB_HOST
       value: mydb-svc
     - name: WORDPRESS_DB_USER
       value: root
     - name: WORDPRESS_DB_PASSWORD
       value: test123
     - name: WORDPRESS_DB_NAME
       value: wordpress
     - name: WORDPRESS_TABLE_PREFIX
       value: abc__ 
---
apiVersion: v1
kind: Service
metadata:
   name: wordpress-svc
spec:
   type: NodePort
   selector:
      app: wordpress
   ports:
   - port: 80
     nodePort: 30124
