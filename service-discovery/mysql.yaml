apiVersion: v1
kind: Pod
metadata:
   name: mysql-pod
   labels:
      app: mydb
   annotations:
      description: "this is sample pod"
spec:
   containers:
   - name: db
     image: mysql:5.7
     ports:
     - containerPort: 3306
     env:
     - name: MYSQL_ROOT_PASSWORD
       value: test123
     - name: MYSQL_DATABASE
       value: wordpress

---
apiVersion: v1
kind: Service
metadata:
   name: mydb-svc
spec:
   selector:
      app: mydb
   ports:
   - port: 3306
 
